name: Daily Price Refresh

on:
  # Every weekday 9:00am Saudi time (UTC+3 = 06:00 UTC)
  schedule:
    - cron: '0 6 * * 1-5'

  # Manual trigger available from GitHub → Actions tab → Run workflow
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to push the updated files back

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance pandas numpy scipy scikit-learn requests anthropic streamlit --quiet

      - name: Refresh prices (no git push — handled below)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_ACTIONS: "true"
        run: python -c "
import sys; sys.path.insert(0, '.')
from daily_refresh import run_daily_refresh
run_daily_refresh(push_to_github=False, verbose=True)
"

      - name: Commit and push updated data
        run: |
          git config user.name  "Tadawul Engine Bot"
          git config user.email "bot@tadawul-engine.local"
          git add memory/all_current_states.json memory/last_refresh.json
          git add data/processed/ || true
          git diff --cached --quiet && echo "Nothing changed" || (
            git commit -m "Daily refresh $(date +'%Y-%m-%d') — prices updated automatically" &&
            git push
          )
